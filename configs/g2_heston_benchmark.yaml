schema_version: 1
protocol_id: g2-heston-terminal-left-tail-v1
frozen: true

# These groups are disjoint by construction. Training seeds may fit proposal
# parameters, validation seeds may select hyperparameters, and evaluation seeds
# are used once for final estimates/tables.
seeds:
  train: [1101, 1102, 1103, 1104, 1105]
  validation: [2101, 2102, 2103, 2104, 2105]
  evaluation: [3101, 3102, 3103, 3104, 3105, 3106, 3107, 3108, 3109, 3110,
               3111, 3112, 3113, 3114, 3115, 3116, 3117, 3118, 3119, 3120]

model:
  spot: 100.0
  variance: 0.04
  maturity: 1.0
  rate: 0.0
  dividend_yield: 0.0
  kappa: 1.5
  theta: 0.04
  xi: 0.30
  rho: -0.70
  dt: 0.00390625  # 1/256

events:
  target_probabilities: [1.0e-4, 1.0e-5, 1.0e-6]
  definition: terminal_spot_at_or_below_reference_quantile

cem:
  paths_per_iteration: 30000
  max_iterations: 8
  elite_quantile: 0.90
  smoothing: 0.70
  initial_control: -1.0

neural:
  objectives: [scaled_second_moment, log_second_moment, entropy_stress]
  hidden_dim: 32
  n_layers: 2
  control_bound: 8.0
  epochs: 50
  paths_per_batch: 5000
  validation_paths: 10000
  learning_rate: 1.0e-3
  validate_every: 5
  gradient_clip: 5.0

evaluation:
  paths_per_seed: 50000
  confidence_level: 0.95
  include_training_cost: true
