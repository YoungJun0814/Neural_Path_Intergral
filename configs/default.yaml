# Default config for driftnet CLI
seed: 42
device: null   # null → auto (cuda > mps > cpu); override with "cpu" or "cuda:0"

heston:
  mu: 0.05          # risk-free rate under Q-measure
  kappa: 2.0        # mean reversion speed
  theta: 0.04       # long-term variance
  xi: 0.5           # vol-of-vol
  rho: -0.7         # leverage correlation
  jump_lambda: 0.0
  jump_mean: 0.0
  jump_std: 0.0

simulate:
  model_type: heston  # one of: heston, bates, svjj
  S0: 100.0
  v0: 0.04
  T: 0.5
  dt: 0.00396825     # 1/252
  num_paths: 20000

calibrate:
  input_dim: 5
  hidden_dim: 64

train_ipm:
  hidden_dim: 64
  n_layers: 3
  learning_rate: 1.0e-4
  epochs: 200
  batch_size_paths: 1000
  dt: 0.00396825     # 1/252
  target_kurtosis: null  # null → compute from data
  w_mean: 50.0
  w_std: 100.0
  w_skew: 0.5
  w_kurt: 0.01
