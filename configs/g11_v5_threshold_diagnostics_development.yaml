schema: npi.g11.v5-threshold-diagnostics.config.v1
protocol_id: g11-v5-threshold-diagnostics-development-v1
frozen: false
estimand: finite_grid
purpose: development_falsification

model_common:
  eta: 1.1
  xi: 0.04
  rho: -0.6
  spot: 100.0
  maturity: 0.25

# eta and rho are held fixed so H effects are not confounded.
models:
  - id: h005
    H: 0.05
  - id: h012
    H: 0.12
  - id: h030
    H: 0.30

hierarchy:
  coarsest_steps: 8
  adjacent_levels: [1, 2, 3, 4, 5]

proposal:
  weights: [0.20, 0.80]
  controls:
    - [[0.0, 0.0], [0.0, 0.0]]
    - [[-0.40, -1.20], [-0.25, -0.70]]

tasks:
  terminal:
    kind: terminal
    level: 94.0
  barrier:
    kind: barrier
    barrier: 90.0

sampling:
  replicates: 8
  paths_per_level: 4096
  engine: fft

analysis:
  denominator_floor: 1.0e-6
  kappa_grid: [1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3]
  early_active_fraction: 0.25
  rate_minimum_level: 2

gates:
  pathwise_tolerance: 1.0e-11
