schema_version: 2
protocol_id: g2-heston-terminal-left-tail-v2-sealed-evaluation
frozen: true

# v1 evaluation seeds were inspected during smoke development. They are not
# eligible for publication evaluation. Only train/validation groups below may
# be used until the final method and acceptance criteria are frozen.
seeds:
  train: [1101, 1102, 1103, 1104, 1105]
  validation: [2101, 2102, 2103, 2104, 2105]
  evaluation: [9101, 9102, 9103, 9104, 9105, 9106, 9107, 9108, 9109, 9110,
               9111, 9112, 9113, 9114, 9115, 9116, 9117, 9118, 9119, 9120]

model:
  spot: 100.0
  variance: 0.04
  maturity: 1.0
  rate: 0.0
  dividend_yield: 0.0
  kappa: 1.5
  theta: 0.04
  xi: 0.30
  rho: -0.70
  dt: 0.00390625

events:
  target_probabilities: [1.0e-4, 1.0e-5, 1.0e-6]
  definition: terminal_spot_at_or_below_reference_quantile

cem:
  paths_per_iteration: 30000
  max_iterations: 8
  elite_quantile: 0.90
  smoothing: 0.70
  initial_control: -1.0

selection:
  architectures: [affine, mlp]
  objectives: [scaled_second_moment, log_second_moment, entropy_stress]
  learning_rates: [1.0e-3, 3.0e-3, 1.0e-2]
  affine_feature_map: linear
  mlp_feature_map: log
  hidden_dim: 32
  n_layers: 2
  control_bound: 8.0
  epochs: 50
  paths_per_batch: 5000
  validation_paths: 10000
  validate_every: 5
  gradient_clip: 5.0
  minimum_online_vrf_vs_cem: 1.0
  maximum_absolute_bias_z: 2.58
  minimum_validation_ci_coverage: 0.80
  validation_selection_seed_count: 3
  audit_paths_per_seed: 50000

evaluation:
  paths_per_seed: 50000
  confidence_level: 0.95
  include_training_cost: true
  sealed: true
